<?xml version="1.0" encoding="UTF-8"?>
<!-- Monochrome silhouette for Android 13+ themed icons. Android applies its own tint,
     so the shape should be solid white/black on transparent; we ship white. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <g fill="#FFFFFF" stroke="#FFFFFF" stroke-linejoin="round" stroke-linecap="round" transform="translate(170 170) scale(0.668)">
    <rect x="260" y="230" width="148" height="564" rx="20" ry="20"/>
    <line x1="400" y1="512" x2="780" y2="240" stroke-width="148"/>
    <line x1="400" y1="512" x2="780" y2="784" stroke-width="148"/>
  </g>
</svg>
