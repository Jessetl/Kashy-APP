<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Rounded-square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="#63E696"/>
  <!-- Subtle inner border to match the reference crisp edge -->
  <rect x="14" y="14" width="996" height="996" rx="210" ry="210" fill="none" stroke="#041A10" stroke-width="8" opacity="0.18"/>

  <!-- K mark -->
  <g fill="#041A10" stroke="#041A10" stroke-linejoin="round" stroke-linecap="round">
    <!-- Vertical bar -->
    <rect x="260" y="230" width="148" height="564" rx="20" ry="20"/>
    <!-- Upper diagonal arm -->
    <line x1="400" y1="512" x2="780" y2="240" stroke-width="148"/>
    <!-- Lower diagonal arm -->
    <line x1="400" y1="512" x2="780" y2="784" stroke-width="148"/>
  </g>
</svg>
